<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🐺👑Traductor de Isereop-Español🦌👤</title>

<style>
body {
    background: #0f0f0f;
    color: white;
    font-family: Consolas, monospace;
    text-align: center;
    padding: 20px;
}

textarea {
    width: 80%;
    height: 100px;
    background: #1e1e1e;
    color: #ffffff;
    border: none;
    padding: 10px;
    margin: 10px;
    font-size: 16px;
}

button {
    background: #222;
    color: white;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🐺👑 Traductor de Isereop-Español🦌👤</h1>

<textarea id="entrada" placeholder="Escribe aquí..."></textarea><br>

<button onclick="aReina()">Español → Isereop</button>
<button onclick="aEspanol()">Isereop → Español</button>

<textarea id="salida" placeholder="Resultado..."></textarea>

<script>

const vocales = "aeiouy";
const consonantes = "bcdfghjklmnpqrstvwxyz";

const diccionario = {
    "esta":"itve",
    "ahi":"ejǫ",
    "aqui":"eryǫ",
    "alguien":"emhyoip",
    "confianza":"dupgoepbe",
    "mas":"nęt",
    "alice":"alice",
    "lucifer":"lucifer",
    "dios":"dios"
};

const preguntas = {
    "quien":"rŷoip",
    "que":"rŷi",
    "donde":"fûpfi",
    "cuando":"dŷepfu",
    "cual":"dŷem"
};

const preguntasInv = Object.fromEntries(
    Object.entries(preguntas).map(([k,v]) => [v,k])
);

const pasado = {"a":"ⱥ","e":"ɇ","i":"ɨ","o":"ø","u":"ʉ","y":"ɏ"};
const pasadoInv = {"ⱥ":"a","ɇ":"e","ɨ":"i","ø":"o","ʉ":"u","ɏ":"y"};

const futuro = {"a":"å","e":"e̊","i":"i̊","o":"o̊","u":"ů","y":"ẙ"};
const futuroInv = {"å":"a","e̊":"e","i̊":"i","o̊":"o","ů":"u","ẙ":"y"};

function moverLetra(l) {
    if (vocales.includes(l)) {
        let i = vocales.indexOf(l);
        return vocales[(i+1)%vocales.length];
    }
    if (consonantes.includes(l)) {
        let i = consonantes.indexOf(l);
        return consonantes[(i+1)%consonantes.length];
    }
    return l;
}

function revertirLetra(l) {
    if (vocales.includes(l)) {
        let i = vocales.indexOf(l);
        return vocales[(i-1+vocales.length)%vocales.length];
    }
    if (consonantes.includes(l)) {
        let i = consonantes.indexOf(l);
        return consonantes[(i-1+consonantes.length)%consonantes.length];
    }
    return l;
}

function aplicarPasado(palabra) {
    for (let i = 0; i < palabra.length; i++) {
        if ("aeiouy".includes(palabra[i])) {
            return palabra.slice(0, i) + pasado[palabra[i]] + palabra.slice(i + 1);
        }
    }
    return palabra;
}

function aplicarFuturo(palabra) {
    for (let i = palabra.length - 1; i >= 0; i--) {
        if ("aeiouy".includes(palabra[i])) {
            return palabra.slice(0, i) + futuro[palabra[i]] + palabra.slice(i + 1);
        }
    }
    return palabra;
}

// 🇪🇸 → 👑
function traducirPalabraReina(palabra) {

    let match = palabra.match(/^([a-záéíóúñ]+)([^a-záéíóúñ]*)$/i);

    let baseOriginal = match ? match[1] : palabra;
    let puntuacion = match ? match[2] : "";

    let tiempo = "normal";

    if (/(ó|í)$/.test(baseOriginal)) tiempo = "pasado";
    else if (/(é|á|án|ás)$/.test(baseOriginal)) tiempo = "futuro";

    let base = baseOriginal.toLowerCase().normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .normalize("NFC");

    if (preguntas[base]) return preguntas[base] + puntuacion;
    if (diccionario[base]) return diccionario[base] + puntuacion;

    let traducida = "";
    for (let c of base) traducida += moverLetra(c);

    if (base.endsWith("mana")) {
        traducida = traducida.slice(0,-4) + "nepa";
    }

    if (tiempo === "pasado") {
        traducida = aplicarPasado(traducida);
    }
    else if (tiempo === "futuro") {
        traducida = aplicarFuturo(traducida);
    }

    return traducida + puntuacion;
}

function aReina() {
    let texto = document.getElementById("entrada").value.toLowerCase();

    let esPregunta = texto.startsWith("¿") && texto.endsWith("?");

    texto = texto.replace("¿","").replace("?","");

    let palabras = texto.split(/\s+/);
    let resultado = palabras.map(p => traducirPalabraReina(p)).join(" ");

    if (esPregunta) resultado = "Et-" + resultado + "-te";

    document.getElementById("salida").value = resultado;
}

// 👑 → 🇪🇸
function traducirPalabraEspanol(palabra) {

    // 🔥 FIX DE MAYÚSCULAS
    palabra = palabra.toLowerCase();

    let match = palabra.match(/^([a-zɨⱥɇøʉɏåe̊i̊o̊ůẙ]+)([^a-zɨⱥɇøʉɏåe̊i̊o̊ůẙ]*)$/i);

    let base = match ? match[1] : palabra;
    let puntuacion = match ? match[2] : "";

    if (preguntasInv[base]) return preguntasInv[base] + puntuacion;

    let tiempo = "normal";

    if (/[ⱥɇɨøʉɏ]/.test(base)) tiempo = "pasado";
    else if (/(å|e̊|i̊|o̊|ů|ẙ)/.test(base)) tiempo = "futuro";

    if (base.endsWith("nepa")) {
        let raiz = base.slice(0,-4);
        let limpio = "";
        for (let c of raiz) limpio += revertirLetra(c);
        return limpio + "mana" + puntuacion;
    }

    if (tiempo === "pasado") {
        base = base.replace(/[ⱥɇɨøʉɏ]/g, m => pasadoInv[m]);
    }
    else if (tiempo === "futuro") {
        base = base.replace(/å|e̊|i̊|o̊|ů|ẙ/g, m => futuroInv[m]);
    }

    let original = "";
    for (let c of base) original += revertirLetra(c);

    if (tiempo === "pasado") {
        if (original.endsWith("io")) original = original.slice(0,-2)+"ió";
        else original += "ó";
    }
    else if (tiempo === "futuro") {
        original += "á";
    }

    return original + puntuacion;
}

function aEspanol() {
    let texto = document.getElementById("entrada").value.toLowerCase();

    let esPregunta = texto.startsWith("et-") && texto.endsWith("-te");

    texto = texto.replace("et-","").replace("-te","");

    let palabras = texto.split(/\s+/);
    let resultado = palabras.map(p => traducirPalabraEspanol(p)).join(" ");

    if (esPregunta) resultado = "¿" + resultado + "?";

    document.getElementById("salida").value = resultado;
}

</script>

</body>
</html>
