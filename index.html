<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🐺👑Traductor de Isereop-Español🦌👤</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTENEDOR */
.app {
    width: 90%;
    max-width: 500px;
    background: rgba(20,20,20,0.9);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

/* TÍTULO */
h1 {
    font-size: 20px;
    margin-bottom: 15px;
    text-align: center;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 90px;
    background: #0d0d0d;
    color: #eaeaea;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 12px;
    margin: 10px 0;
    font-size: 14px;
    resize: none;
    transition: 0.25s;
    font-family: 'Inter', sans-serif;
    box-sizing: border-box;
}

textarea::placeholder {
    color: #666;
}

textarea:focus {
    outline: none;
    border-color: #ba0000;
    box-shadow: 0 0 0 2px rgba(255,42,42,0.2);
}

/* BOTONES */
.botones {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

button {
    flex: 1;
    min-width: 120px;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #ba0000;
    transform: translateY(-2px);
}

/* ANIMACIÓN */
.loading {
    opacity: 0.5;
    position: relative;
}

.loading::after {
    content: "Traduciendo...";
    position: absolute;
    right: 10px;
    bottom: 5px;
    font-size: 12px;
    color: #ba0000;
}

/* MODO CLARO */
.light {
    background: linear-gradient(135deg, #f5f5f5, #dddddd);
    color: black;
}

.light .app {
    background: white;
    color: black;
}

.light textarea {
    background: #f0f0f0;
    color: black;
}
</style>
</head>

<body>

<div class="app">

<h1>🐺👑Traductor de Isereop-Español🦌👤</h1>

<textarea id="entrada" placeholder="Escribe aquí..."></textarea>

<div class="botones">
<button onclick="invertir()">Isereop ↔ Español</button>
<button onclick="copiar()">Copiar</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="toggleModo()">Oscuro ↔ Claro</button>
</div>

<textarea id="salida"></textarea>

<div id="historial"></div>

<audio id="sonido">
<source src="https://www.myinstants.com/media/sounds/keyboard-single-click.mp3">
</audio>

<script>

const vocales = "aeiouy";
const consonantes = "bcdfghjklmnpqrstvwxyz";

const diccionario = {
    "esta":"itve",
    "ahi":"ejǫ",
    "aqui":"eryǫ",
    "alguien":"emhyoip",
    "confianza":"dupgoepbe",
    "mas":"nęt",
    "alice":"alice",
    "lucifer":"lucifer",
    "dios":"dios"
};

const preguntas = {
    "quien":"rŷoip",
    "que":"rŷi",
    "donde":"fûpfi",
    "cuando":"dŷepfu",
    "cual":"dŷem",
    "como":"dûnu"
};

const preguntasInv = Object.fromEntries(
    Object.entries(preguntas).map(([k,v]) => [v,k])
);

const pasado = {"a":"ⱥ","e":"ɇ","i":"ɨ","o":"ø","u":"ʉ","y":"ɏ"};
const pasadoInv = {"ⱥ":"a","ɇ":"e","ɨ":"i","ø":"o","ʉ":"u","ɏ":"y"};

const futuro = {"a":"å","e":"e̊","i":"i̊","o":"o̊","u":"ů","y":"ẙ"};
const futuroInv = {"å":"a","e̊":"e","i̊":"i","o̊":"o","ů":"u","ẙ":"y"};

let modo = "es-a-isereop"; // estado inicial

function moverLetra(l) {
    if (vocales.includes(l)) {
        let i = vocales.indexOf(l);
        return vocales[(i+1)%vocales.length];
    }
    if (consonantes.includes(l)) {
        let i = consonantes.indexOf(l);
        return consonantes[(i+1)%consonantes.length];
    }
    return l;
}

function revertirLetra(l) {
    if (vocales.includes(l)) {
        let i = vocales.indexOf(l);
        return vocales[(i-1+vocales.length)%vocales.length];
    }
    if (consonantes.includes(l)) {
        let i = consonantes.indexOf(l);
        return consonantes[(i-1+consonantes.length)%consonantes.length];
    }
    return l;
}

function aplicarPasado(palabra) {
    for (let i = 0; i < palabra.length; i++) {
        if ("aeiouy".includes(palabra[i])) {
            return palabra.slice(0, i) + pasado[palabra[i]] + palabra.slice(i + 1);
        }
    }
    return palabra;
}

function aplicarFuturo(palabra) {
    for (let i = palabra.length - 1; i >= 0; i--) {
        if ("aeiouy".includes(palabra[i])) {
            return palabra.slice(0, i) + futuro[palabra[i]] + palabra.slice(i + 1);
        }
    }
    return palabra;
}

function traducirPalabraReina(palabra) {
    let match = palabra.match(/^([a-záéíóúñ]+)([^a-záéíóúñ]*)$/i);

    let baseOriginal = match ? match[1] : palabra;
    let puntuacion = match ? match[2] : "";

    let tiempo = "normal";

    if (/(ó|í)$/.test(baseOriginal)) tiempo = "pasado";
    else if (/(é|á|án|ás)$/.test(baseOriginal)) tiempo = "futuro";

    let base = baseOriginal.toLowerCase().normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .normalize("NFC");

    if (preguntas[base]) return preguntas[base] + puntuacion;
    if (diccionario[base]) return diccionario[base] + puntuacion;

    let traducida = "";
    for (let c of base) traducida += moverLetra(c);

    if (base.endsWith("mana")) {
        traducida = traducida.slice(0,-4) + "nepa";
    }

    if (tiempo === "pasado") traducida = aplicarPasado(traducida);
    else if (tiempo === "futuro") traducida = aplicarFuturo(traducida);

    return traducida + puntuacion;
}

function aReina() {
    let texto = document.getElementById("entrada").value.toLowerCase();

    let esPregunta = texto.startsWith("¿") && texto.endsWith("?");

    texto = texto.replace("¿","").replace("?","");

    let palabras = texto.split(/\s+/);
    let resultado = palabras.map(p => traducirPalabraReina(p)).join(" ");

    if (esPregunta) resultado = "Et-" + resultado + "-te";

    document.getElementById("salida").value = resultado;
    animarSalida();
}

function traducirPalabraEspanol(palabra) {

    palabra = palabra.toLowerCase();

    let match = palabra.match(/^([a-zɨⱥɇøʉɏåe̊i̊o̊ůẙ]+)([^a-zɨⱥɇøʉɏåe̊i̊o̊ůẙ]*)$/i);

    let base = match ? match[1] : palabra;
    let puntuacion = match ? match[2] : "";

    if (preguntasInv[base]) return preguntasInv[base] + puntuacion;

    let tiempo = "normal";

    if (/[ⱥɇɨøʉɏ]/.test(base)) tiempo = "pasado";
    else if (/(å|e̊|i̊|o̊|ů|ẙ)/.test(base)) tiempo = "futuro";

    if (base.endsWith("nepa")) {
        let raiz = base.slice(0,-4);
        let limpio = "";
        for (let c of raiz) limpio += revertirLetra(c);
        return limpio + "mana" + puntuacion;
    }

    if (tiempo === "pasado") {
        base = base.replace(/[ⱥɇɨøʉɏ]/g, m => pasadoInv[m]);
    }
    else if (tiempo === "futuro") {
        base = base.replace(/å|e̊|i̊|o̊|ů|ẙ/g, m => futuroInv[m]);
    }

    let original = "";
    for (let c of base) original += revertirLetra(c);

    if (tiempo === "pasado") {
        if (original.endsWith("io")) original = original.slice(0,-2)+"ió";
        else original += "ó";
    }
    else if (tiempo === "futuro") {
        original += "á";
    }

    return original + puntuacion;
}

function aEspanol() {
    let texto = document.getElementById("entrada").value.toLowerCase();

    let esPregunta = texto.startsWith("et-") && texto.endsWith("-te");

    texto = texto.replace("et-","").replace("-te","");

    let palabras = texto.split(/\s+/);
    let resultado = palabras.map(p => traducirPalabraEspanol(p)).join(" ");

    if (esPregunta) resultado = "¿" + resultado + "?";

    document.getElementById("salida").value = resultado;
    animarSalida();
}

function copiar() {
    let texto = document.getElementById("salida");
    texto.select();
    document.execCommand("copy");
}

function limpiar() {
    document.getElementById("entrada").value = "";
    document.getElementById("salida").value = "";
}

function toggleModo(){
    document.body.classList.toggle("light");
}

function animarSalida(){
    let salida = document.getElementById("salida");
    salida.classList.add("loading");

    setTimeout(()=>{
        salida.classList.remove("loading");
    }, 600);
}

function invertir(){
    let entrada = document.getElementById("entrada");
    let salida = document.getElementById("salida");

    // intercambiar textos
    let temp = entrada.value;
    entrada.value = salida.value;
    salida.value = temp;

    // cambiar modo
    if(modo === "es-a-isereop"){
        modo = "isereop-a-es";
    } else {
        modo = "es-a-isereop";
    }

    traducirAutomatico();
}

function invertir(){
    let entrada = document.getElementById("entrada");
    let salida = document.getElementById("salida");

    // intercambiar textos
    let temp = entrada.value;
    entrada.value = salida.value;
    salida.value = temp;

    // cambiar modo
    if(modo === "es-a-isereop"){
        modo = "isereop-a-es";
    } else {
        modo = "es-a-isereop";
    }

    traducirAutomatico();
}

function traducirAutomatico(){
    if(modo === "es-a-isereop"){
        aReina();
    } else {
        aEspanol();
    }
}

document.getElementById("entrada").addEventListener("input", traducirAutomatico);

</script>

</body>
</html>
